name: Publish to Maven Central

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'       # v1.0.0
      - 'v[0-9]+.[0-9]+.[0-9]+-*'      # v1.0.0-beta01, v1.0.0-rc1
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.5.0)'
        required: true
        type: string

permissions:
  contents: write                        # required to create GitHub Releases

concurrency:
  group: publish-${{ github.event.inputs.version || github.ref_name }}
  cancel-in-progress: false             # never cancel a publish mid-flight

jobs:
  # ── 1. Test on all platforms ─────────────────────────────────────────────
  test:
    name: Test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false                  # let macos tests still run if ubuntu fails
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4
        continue-on-error: true          # Fixes the ETIMEDOUT issue blocking the build

      - name: Run tests
        run: ./gradlew desktopTest --no-configuration-cache --stacktrace
        continue-on-error: false         # We still want to know if tests fail, but see 'publish' job below

      - name: Verify iOS compilation
        if: runner.os == 'macOS'
        run: ./gradlew :koog-compose-core:compileKotlinIosSimulatorArm64 :koog-compose-device:compileKotlinIosSimulatorArm64 :koog-compose-testing:compileKotlinIosSimulatorArm64 --no-configuration-cache --stacktrace

  # ── 2. Publish to Maven Central ──────────────────────────────────────────
  publish:
    name: Publish to Maven Central
    needs: test
    if: always() && needs.test.result == 'success'
    runs-on: macos-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.ref_name }}"
            echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish and release
        env:
          VERSION_NAME: ${{ steps.version.outputs.VERSION }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}
        run: |
          ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository \
            -PVERSION_NAME=$VERSION_NAME \
            --no-configuration-cache \
            --stacktrace
  # ── 3. Create GitHub Release ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    if: needs.publish.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
