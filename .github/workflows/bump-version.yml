name: Bump Version

on:
  workflow_run:
    workflows: ["Publish to Maven Central"]
    types: [completed]

permissions:
  contents: write

jobs:
  bump:
    name: Bump patch + build number
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_commit.author.name != 'koog-compose-bot[bot]'

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.BUMP_BOT_APP_ID }}
          private-key: ${{ secrets.BUMP_BOT_PRIVATE_KEY }}

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 1

      - name: Read current version
        id: current
        run: |
          echo "major=$(grep '^VERSION_MAJOR=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"
          echo "minor=$(grep '^VERSION_MINOR=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"
          echo "patch=$(grep '^VERSION_PATCH=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"
          echo "build=$(grep '^VERSION_BUILD=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Calculate next version
        id: next
        run: |
          NEXT_PATCH=$(( ${{ steps.current.outputs.patch }} + 1 ))
          NEXT_BUILD=$(( ${{ steps.current.outputs.build }} + 1 ))
          NEXT_VERSION="${{ steps.current.outputs.major }}.${{ steps.current.outputs.minor }}.${NEXT_PATCH}"
          echo "patch=$NEXT_PATCH"     >> "$GITHUB_OUTPUT"
          echo "build=$NEXT_BUILD"     >> "$GITHUB_OUTPUT"
          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Write new version to gradle.properties
        run: |
          sed -i "s/^VERSION_PATCH=.*/VERSION_PATCH=${{ steps.next.outputs.patch }}/" gradle.properties
          sed -i "s/^VERSION_BUILD=.*/VERSION_BUILD=${{ steps.next.outputs.build }}/" gradle.properties
          sed -i "s/^VERSION_NAME=.*/VERSION_NAME=${{ steps.next.outputs.version }}/" gradle.properties

      - name: Commit, tag, and push
        run: |
          git config user.name  "koog-compose-bot[bot]"
          git config user.email "koog-compose-bot[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore: bump version to ${{ steps.next.outputs.version }} [build ${{ steps.next.outputs.build }}] [skip ci]"
          git tag "v${{ steps.next.outputs.version }}"
          git push origin main
          git push origin "v${{ steps.next.outputs.version }}"