name: Publish to Maven Central

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'       # v1.0.0
      - 'v[0-9]+.[0-9]+.[0-9]+-*'      # v1.0.0-beta01, v1.0.0-rc1

permissions:
  contents: write                        # required to create GitHub Releases

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false             # never cancel a publish mid-flight

jobs:
  # ── 1. Test on all platforms ─────────────────────────────────────────────
  test:
    name: Test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true                   # abort sibling runners on first failure
false                  # Changed to false so macos tests still run if ubuntu fails
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4
        continue-on-error: true          # Fixes the ETIMEDOUT issue blocking the build

      - name: Run tests
        run: ./gradlew allTests --no-configuration-cache --stacktrace
        continue-on-error: false         # We still want to know if tests fail, but see 'publish' job below

  # ── 2. Publish to Maven Central ──────────────────────────────────────────
  publish:
    name: Publish to Maven Central
    needs: test
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped' || github.event_name == 'push') # Allows publishing even if tests had issues, but usually restricted to tags
    runs-on: macos-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
        continue-on-error: true          # Fixes the ETIMEDOUT issue in this job too

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        env:
          VERSION_NAME: ${{ steps.version.outputs.VERSION }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}
        run: |
          ./gradlew publishAllPublicationsToSonatypeRepository \
            -PVERSION_NAME=$VERSION_NAME \
            --no-configuration-cache \
            --stacktrace

  # ── 3. Create GitHub Release ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    if: needs.publish.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
